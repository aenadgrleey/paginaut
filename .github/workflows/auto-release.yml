name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run core all-platform tests
        run: ./gradlew :paginaut-core:allTests --stacktrace

      - name: Build all modules
        run: ./gradlew build --stacktrace

      - name: Generate release metadata
        id: meta
        shell: bash
        run: |
          version="$(grep 'paginaut.version' gradle.properties | cut -d= -f2 | tr -d ' ')"
          if [[ -z "$version" ]]; then
            echo "Could not read paginaut.version from gradle.properties"
            exit 1
          fi

          tag="v${version}"
          existing="$(git tag -l "$tag")"
          if [[ -n "$existing" ]]; then
            echo "Tag $tag already exists — nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=Auto Release $tag" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        if: steps.meta.outputs.skip != 'true'
        run: |
          git tag "${{ steps.meta.outputs.tag }}" "${GITHUB_SHA}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub release
        if: steps.meta.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
